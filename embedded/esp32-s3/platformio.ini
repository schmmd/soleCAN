[platformio]
boards_dir = boards

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
board_build.embed_txtfiles = src/dashboard.html
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    '-DWIFI_SSID="${sysenv.WIFI_SSID}"'
    '-DWIFI_PASS="${sysenv.WIFI_PASS}"'
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0

[env:adafruit_feather_s3]
board = adafruit_feather_esp32s3_reversetft
board_build.partitions = min_spiffs.csv
build_flags = ${env.build_flags} -DBOARD_ADAFRUIT_FEATHER_S3

[env:lilygo_t2can]
board = esp32s3_flash_16MB
board_build.arduino.memory_type = qio_opi
board_build.partitions = default_16MB.csv
build_flags = ${env.build_flags} -DBOARD_LILYGO_T2CAN -DBOARD_HAS_PSRAM
