; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
boards_dir = boards

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
board_build.embed_txtfiles = src/dashboard.html
build_flags =
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1
	'-DWIFI_SSID="${sysenv.WIFI_SSID}"'
	'-DWIFI_PASS="${sysenv.WIFI_PASS}"'
lib_deps =
	bblanchon/ArduinoJson @ ^7.0.0
# Optional: override the WiFi AP SSID/password and mDNS hostname from
# AP_SSID / AP_PASS / MDNS_NAME env vars. A no-op when they are unset, so the
# default build is unchanged.
extra_scripts =
	pre:copy_dashboard.py
	pre:inject_build_overrides.py
	pre:inject_git_sha.py

; ---------------------------------------------------------------------------
; Cross-env opt-in build flags (append to any env's build_flags):
;   -DCAN_LISTEN_ONLY  CAN controller never transmits (no ACKs / no error
;                      frames) — for tapping a bus shared with a device you
;                      must not disturb. Disables all TX (SLCAN / socketcand
;                      send / UDS poll). Works on all boards.
;   -DAUTOSHUTDOWN     Deep sleep after ~10 min of CAN-bus silence; wake on
;                      the next CAN frame (ext0 on CAN_RX). Experimental —
;                      off by default.
; ---------------------------------------------------------------------------

[env:adafruit_feather_s3]
board = adafruit_feather_esp32s3_reversetft
board_build.partitions = min_spiffs.csv
build_flags = ${env.build_flags} -DBOARD_ADAFRUIT_FEATHER_S3

[env:lilygo_t2can]
board = esp32s3_flash_16MB
board_build.arduino.memory_type = qio_opi
board_build.partitions = default_16MB.csv
build_flags = ${env.build_flags} -DBOARD_LILYGO_T2CAN -DBOARD_HAS_PSRAM
lib_deps =
	${env.lib_deps}
	pierremolinaro/ACAN2515@^2.1.5

[env:rejsacan]
; RejsaCAN-ESP32-S3 v3.x — ESP32-S3-WROOM-1-N16R8 (16 MB flash, 8 MB OPI PSRAM).
; https://github.com/MagnusThome/RejsaCAN-ESP32
board = esp32s3_flash_16MB
board_build.arduino.memory_type = qio_opi
board_build.partitions = default_16MB.csv
build_flags = ${env.build_flags} -DBOARD_REJSACAN -DBOARD_HAS_PSRAM
