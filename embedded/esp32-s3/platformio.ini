; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
boards_dir = boards

[env]
; Arduino core 3.x via the community "pioarduino" platform fork. The official
; espressif32 platform is frozen at Arduino core 2.0.17, whose UART layer
; breaks the Kelly serial link (bench-verified 2026-07-08: core-2 builds read
; only mangled frames on a wire that core-3 builds decode 100%). pioarduino
; release 55.03.39 = Arduino core 3.3.9 on ESP-IDF 5.5.4.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
framework = arduino
monitor_speed = 115200
board_build.embed_txtfiles = src/dashboard.html
build_flags =
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1
	'-DWIFI_SSID="${sysenv.WIFI_SSID}"'
	'-DWIFI_PASS="${sysenv.WIFI_PASS}"'
lib_deps =
	bblanchon/ArduinoJson @ ^7.0.0
# Optional: override the WiFi AP SSID/password and mDNS hostname from
# AP_SSID / AP_PASS / MDNS_NAME env vars. A no-op when they are unset, so the
# default build is unchanged.
extra_scripts =
	pre:copy_dashboard.py
	pre:inject_build_overrides.py
	pre:inject_git_sha.py

; ---------------------------------------------------------------------------
; Cross-env opt-in build flags (append to any env's build_flags):
;   -DCAN_ALLOW_TX  Bring both CAN controllers up in NORMAL mode so they ACK
;                   received frames AND can transmit — arms SLCAN t/T injection
;                   over USB and socketcand `< send >` over WiFi. Only build
;                   this way to deliberately write to the bus. Without it (the
;                   default) both controllers run listen-only: a hardware-
;                   enforced passive tap that never drives a bit. Works on all
;                   boards.
;   -DENABLE_KELLY  Poll the Kelly e-hydraulic pump controller on UART1 (GPIO47
;                   RX / GPIO48 TX) and add a `kelly` object to /json. Read-only:
;                   only the monitor queries are ever sent. RejsaCAN-only (compile
;                   error on other boards). Off by default; append to
;                   [env:rejsacan] to enable. Wiring and the 5 V-TTL series
;                   resistor are documented in kelly/README.md.
;   -DKELLY_PASSTHROUGH  Bench test only (requires -DENABLE_KELLY). Turns the
;                   board into a transparent native-USB <-> Kelly-UART bridge so
;                   solectrac-kelly-monitor.py can talk through it and validate
;                   the Kelly UART wiring. Disables all normal operation (no CAN,
;                   decode, or SLCAN) — never ship a build with this set.
;   -DKELLY_BAUD_MEASURE  Diagnose the baud offset: times the waveform on both
;                   Kelly UART pins against the 40 MHz crystal (GPIO edge
;                   interrupts, pure snooping — polling still runs) and adds a
;                   "kelly_baud" object to /json with the measured line rate of
;                   each side plus the UART divisor/clock-source registers.
;                   /json "rx" = the Kelly's real transmit rate, "tx" = this
;                   board's. Needs -DENABLE_KELLY.
;   -DKELLY_DEBUG   Add a "kelly_dbg" object to /json with the Kelly serial-path
;                   diagnostics (poll/frame/block counts, locked baud, worst
;                   flicker gap, last raw frame). Handy for tuning; off by
;                   default so production /json stays clean. Needs -DENABLE_KELLY.
;   -DNO_WIFI       Bisect/bench only: skip all WiFi bring-up (soft-AP, STA,
;                   HTTP dashboard, DNS, mDNS, socketcand) so the radio never
;                   keys for WiFi. The board is then reachable over USB only
;                   (SLCAN / Kelly passthrough). Used to isolate radio
;                   interference with the Kelly serial RX.
;   -DNO_BLE        Bisect/bench only: skip BLE init/advertising. Combine with
;                   -DNO_WIFI for a fully radio-silent build.
; ---------------------------------------------------------------------------

[env:adafruit_feather_s3]
board = adafruit_feather_esp32s3_reversetft
board_build.partitions = min_spiffs.csv
build_flags = ${env.build_flags} -DBOARD_ADAFRUIT_FEATHER_S3

[env:lilygo_t2can]
board = esp32s3_flash_16MB
board_build.arduino.memory_type = qio_opi
board_build.partitions = default_16MB.csv
build_flags = ${env.build_flags} -DBOARD_LILYGO_T2CAN -DBOARD_HAS_PSRAM
lib_deps =
	${env.lib_deps}
	pierremolinaro/ACAN2515@^2.1.5

[env:rejsacan]
; RejsaCAN-ESP32-S3 v3.x — ESP32-S3-WROOM-1-N16R8 (16 MB flash, 8 MB OPI PSRAM).
; https://github.com/MagnusThome/RejsaCAN-ESP32
board = esp32s3_flash_16MB
board_build.arduino.memory_type = qio_opi
board_build.partitions = default_16MB.csv
build_flags = ${env.build_flags} -DBOARD_REJSACAN -DBOARD_HAS_PSRAM
