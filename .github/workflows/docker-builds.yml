name: Docker builds

# Verifies that both Dockerfiles still build from a clean checkout. No images
# are pushed — this is a build-only check that catches base-image drift,
# broken COPY paths, missing files referenced by the build, etc.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  firmware:
    name: ESP32 firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build firmware image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: esp32-s3/Dockerfile
          push: false
          cache-from: type=gha,scope=firmware
          cache-to: type=gha,scope=firmware,mode=max

  android:
    name: Android app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Android image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: android/Dockerfile
          push: false
          cache-from: type=gha,scope=android
          cache-to: type=gha,scope=android,mode=max

  python:
    name: Python tooling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # The Python Dockerfile runs `py_compile` and `--help` on both scripts
      # as its final RUN step, so a successful build is the verification.
      - name: Build Python image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          cache-from: type=gha,scope=python
          cache-to: type=gha,scope=python,mode=max
